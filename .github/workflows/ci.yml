name: .NET CI

on:
  push:
    branches: [ petly_9 ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.x

    - run: dotnet restore AppCode/Petly_2term.sln
    - run: dotnet build AppCode/Petly_2term.sln --no-restore
    - run: dotnet test AppCode/Petly_2term.sln --no-build