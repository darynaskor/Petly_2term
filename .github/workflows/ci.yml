name: CI - Petly_7

on:
  push:
    branches:
      - petly_7
  pull_request:
    branches:
      - petly_7

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: AppCode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore AppCode/Petly_2term.slnx

      - name: Build
        run: dotnet build AppCode/Petly_2term.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test AppCode/Petly_2term.slnx --configuration Release --no-build --verbosity normal