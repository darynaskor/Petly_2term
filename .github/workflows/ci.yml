name: .NET CI

on:
  push:
    branches: [ petly_9 ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - run: dotnet restore AppCode/Petly/Petly.csproj
    - run: dotnet build AppCode/Petly/Petly.csproj --no-restore